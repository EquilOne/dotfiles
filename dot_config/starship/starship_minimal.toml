"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$directory\
$git_branch\
$git_status\
$fill\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$conda\
$python\
$custom\
$line_break\
$os\
$shell\
[пҒЎ](fg:text) \
"""

palette = "rose-pine-moon"

[palettes.rose-pine-moon]
overlay = '#393552'
surface = '#2a273f'
love = '#eb6f92'
gold = '#f6c177'
# rose = '#ea9a97' # moon
rose = '#d7827e' # dawn
# pine = '#3e8fb0' # moon
pine = '#31748f' # main 
# pine = '#286983' # dawn
foam = '#9ccfd8'
iris = '#c4a7e7'
text = '#e0def4'
hightlight = '#56526e'
subtle = '#908caa'
muted = '#6e6a86'

[shell]
disabled = false
style = "bg:rose fg:text"
format = "[ $indicator ]($style)[оӮҙ](fg:rose) "
bash_indicator = "оҜҠ"
fish_indicator = "п’Ӣ"
zsh_indicator = "п’җ"
powershell_indicator = "оҜҮ"
cmd_indicator = "оҜ„"

[os]
disabled = false
style = "bg:pine fg:text"
format = "\n[оӮ¶](fg:pine)[ $symbol]($style)"

[directory]
format = "[оӮ¶](fg:muted)[$path]($style)[оӮҙ](fg:muted) "
style = "bg:muted fg:text"
truncation_length = 2
truncation_symbol = "вҖҰ/"
read_only = " у°Ңҫ"
truncate_to_repo = true

[directory.substitutions]
Documents = "у°Ҳҷ"
Downloads = "пҖҷ "
Music = "пҖҒ "
Pictures = "пҖҫ "
# "~" = 'пҖ• :'
# "~" = "п‘ӯ "
"root" = "оӯ… "
".config" = "оҳ• "
"workspace" = "п„Ў "
"github" = "оӘ„ "
"equilone" = "п‘ғ "

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "\n\n[оӮ¶](fg:overlay)[$branch]($style)"
style = "bg:overlay fg:subtle"
symbol = "пҗҳ"

[git_status]
disabled = false
style = "bg:overlay fg:love"
format = "[$ahead_behind$all_status]($style)[оӮҙ](fg:overlay)"
up_to_date = ' [\(вң“\)](bg:overlay fg:iris)'
untracked = ' [?\($count\)](bg:overlay fg:gold)'
stashed = ' [\$](bg:overlay fg:iris)'
modified = ' [!\($count\)](bg:overlay fg:gold)'
renamed = ' [В»\($count\)](bg:overlay fg:iris)'
deleted = ' [вңҳ\($count\)](style)'
staged = ' [++\($count\)](bg:overlay fg:gold)'
ahead = ' [вҮЎ\(${count}\)](bg:overlay fg:foam)'
diverged = ' вҮ•[\[](bg:overlay fg:iris)[вҮЎ\(${ahead_count}\)](bg:overlay fg:foam)[вҮЈ\(${behind_count}\)](bg:overlay fg:rose)[\]](bg:overlay fg:iris)'
behind = ' [вҮЈ\(${count}\)](bg:overlay fg:rose)'

[time]
disabled = true
format = " [оӮ¶](fg:overlay)[ $time у°ҙҲ ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:rose"
time_format = "%I:%M%P"
use_12hr = false

[username]
disabled = true
format = "[оӮ¶](fg:surface)[о·… $user]($style)[оӮҙ](fg:surface) "
show_always = true
style_root = "bg:surface fg:love"
style_user = "bg:surface fg:foam"
aliases = { "chase" = "Equil", "equilone" = "Equil", "root" = "Daddy" }

[line_break]
disabled = false

[custom.chezmoi]
style = "bg:overlay fg:subtle"
format = "[оӮ¶](fg:overlay)[$symbol$output]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = 'у°Ј« '
when = ''' [[ $PWD == $XDG_DATA_HOME/chezmoi* ]] '''
# command = """chezmoi --version | awk '{print $3}' | tr -d ','"""

# Languages

