[nodejs]
style = "bg:overlay fg:subtle"
format = "[оӮ¶](fg:overlay)[$symbol]($style)[оӮҙ](fg:overlay)"
disabled = true
symbol = "у°Һҷ "

[nim]
style = "bg:overlay fg:subtle"
format = "[оӮ¶](fg:overlay)[$symbol]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "у°ҶҘ "

[rust]
style = "bg:overlay fg:subtle"
format = "[оӮ¶](fg:overlay)[$symbol]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "оһЁ "

[scala]
style = "bg:overlay fg:subtle"
format = "[оӮ¶](fg:overlay)[$symbol]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "оң· "

[python]
style = "bg:overlay fg:subtle"
format = "[оӮ¶](fg:overlay)[$symbol]($style)[$version]($style)[оӮҙ](fg:overlay)"
version_format = 'v${major}.${minor}'
disabled = false
symbol = 'уұ”Һ '
detect_files = ["uv.lock", "pyproject.toml", ".python-version"]

[conda]
style = "bg:overlay fg:subtle"
format = "[оӮ¶](fg:overlay)[$symbol$environment]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = 'рҹ…’ '

